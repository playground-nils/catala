name: CI
'on':
  push:
    branches:
    - master
    tags:
    - '*.*.*'
  workflow_dispatch: null
  pull_request_target: null
env:
  GIT_FETCH_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha
    || github.sha }}
  COLUMNS: '165'
jobs:
  build:
    name: Build Catala and generate CI Docker image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/catalalang/catala@${{ steps.image.outputs.digest }}
      version: ${{ steps.describe.outputs.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ env.GIT_FETCH_REF }}
    - name: Get git-describe version
      id: describe
      run: 'git config --global --add safe.directory "${GITHUB_WORKSPACE}"

        echo "version=$(git describe --tags)" >> "$GITHUB_OUTPUT"

        '
    - name: Get an image tag that Docker accepts
      id: branch
      run: sed 's/[^a-zA-Z0-9-]/-/g; s/^/tag=/' <<<"${{ github.head_ref || github.ref_name
        }}" >> "$GITHUB_OUTPUT"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Make build context image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: dev-build-context
        cache-from: 'type=registry,ref=ghcr.io/catalalang/catala:dev-cache-master

          type=registry,ref=ghcr.io/catalalang/catala:dev-cache-${{ steps.branch.outputs.tag
          }}

          '
        cache-to: 'type=registry,ref=ghcr.io/catalalang/catala:dev-cache-${{ steps.branch.outputs.tag
          }},mode=max

          '
    - name: Build and push
      id: image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/catalalang/catala:${{ steps.describe.outputs.version }}
        build-args: CATALA_VERSION=${{ steps.describe.outputs.version }}
        labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository
          }}
        cache-from: 'type=registry,ref=ghcr.io/catalalang/catala:build-cache-master

          type=registry,ref=ghcr.io/catalalang/catala:build-cache-${{ steps.branch.outputs.tag
          }}

          '
        cache-to: 'type=registry,ref=ghcr.io/catalalang/catala:build-cache-${{ steps.branch.outputs.tag
          }},mode=max

          '
  tests:
    name: Run integrated tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image }}
      options: --user root
    steps:
    - name: Fix home
      run: 'HOME=/home/ocaml

        sudo sh -c "echo HOME=$HOME >> ${GITHUB_ENV}"

        git config --global --add safe.directory /home/ocaml/catala

        '
    - name: Check promoted files
      run: 'cd /home/ocaml/catala && opam exec -- make check-promoted && git diff
        --exit-code

        '
    - name: Run base tests
      if: ${{ always() }}
      run: cd /home/ocaml/catala && opam exec -- make unit-tests backend-tests testsuite-base
    - name: Run extra tests
      if: ${{ always() }}
      run: cd /home/ocaml/catala && opam exec -- dune exec -- clerk test tests-extra
        doc
    - name: Generate test report
      if: ${{ always() }}
      run: 'cd /home/ocaml/catala

        opam exec -- dune exec -- clerk report --xml _build/*@test _build/test-*/*@test
        >report.junit.xml

        '
    - name: Test web interpreter
      run: 'cd /home/ocaml/catala && opam exec -- dune build @runtest-js

        '
    - name: Validate Python runtime
      if: ${{ always() }}
      run: cd /home/ocaml/catala && opam exec -- make validate-py-runtime
    - name: Test Summary
      uses: test-summary/action@v2
      with:
        paths: /home/ocaml/catala/report.junit.xml
      if: ${{ always() }}
  examples:
    name: Build catala-examples and generate artifacts
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image }}
      options: --user root
      env:
        DUNE_PROFILE: release
        OPAMSWITCH: /home/ocaml/catala
    steps:
    - name: Fix home
      run: sudo sh -c "echo HOME=/home/ocaml >> ${GITHUB_ENV}"
    - name: Install LaTeX deps
      run: sudo apk add typst texlive-xetex texmf-dist-latexextra texmf-dist-binextra
        texmf-dist-pictures texmf-dist-fontsrecommended font-dejavu groff libpng
    - name: Build Catala extra docs
      run: 'cd ~/catala

        opam --cli=2.1 exec -- make syntax

        opam --cli=2.1 exec -- make doc

        '
    - name: Checkout examples repo
      run: 'git clone https://github.com/CatalaLang/catala-examples --depth 1 ~/catala-examples
        -b "${{ github.head_ref || github.ref_name }}" ||

        git clone https://github.com/CatalaLang/catala-examples --depth 1 ~/catala-examples

        '
    - name: Build examples
      run: 'cd ~/catala-examples

        . ~/catala/_python_venv/bin/activate && opam --cli=2.1 exec -- make all testsuite

        '
    - name: Generate examples test report
      if: ${{ always() }}
      run: 'cd ~/catala-examples

        opam exec -- clerk report --xml _build/clerk_tests/*@test _build/clerk_tests/test-*/*@test
        >report.junit.xml

        '
    - name: Test Summary
      uses: test-summary/action@v2
      with:
        paths: /home/ocaml/catala-examples/report.junit.xml
      if: ${{ always() }}
    - name: Gather all artifacts
      run: 'cd

        mkdir -p artifacts

        mv catala/_build/default/_doc/_html artifacts/api-doc

        mv catala/doc/syntax/syntax.pdf artifacts/

        mv catala/_build/default/*.html artifacts/

        mv catala/_build/default/compiler/web/catala_web_interpreter.bc.js artifacts/catala_web_interpreter.js

        '
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Catala examples
        path: /home/ocaml/artifacts/*
  language-server:
    name: Build and test the language server
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build.outputs.image }}
      options: --user root
      env:
        DUNE_PROFILE: release
        OPAMSWITCH: /home/ocaml/catala
    steps:
    - name: Fix home
      run: sudo sh -c "echo HOME=/home/ocaml >> ${GITHUB_ENV}"
    - name: Checkout language server repo
      run: 'git clone https://github.com/CatalaLang/catala-language-server --depth
        1 ~/catala-language-server -b "${{ github.head_ref || github.ref_name }}"
        ||

        git clone https://github.com/CatalaLang/catala-language-server --depth 1 ~/catala-language-server

        '
    - name: Build the language server
      run: 'cd ~/catala-language-server

        opam install conf-npm -y

        npm install

        opam install . --ignore-constraints-on=catala --ignore-pin-depends --with-test
        -y

        opam exec -- dune runtest

        '
  pages:
    name: Publish static content to github-pages
    needs:
    - examples
    - tests
    if: ${{ github.event_name != 'pull_request_target' && github.ref == 'refs/heads/master'
      }}
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Setup Pages
      uses: actions/configure-pages@v3
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
        path: artifacts/
    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: tree
        version: 1.0
    - name: Generate HTML index
      run: 'cd artifacts

        tree -H . -L 1 --noreport --dirsfirst -T ''Catala latest development artifacts''
        --charset utf-8 -o index.html

        '
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: artifacts/
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
  windows-build:
    name: Build Catala on Windows
    runs-on: windows-latest
    env:
      OPAMCONFIRMLEVEL: unsafe-yes
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ env.GIT_FETCH_REF }}
    - name: Install opam and Ninja via winget
      run: 'winget install --id OCaml.opam --source winget --accept-package-agreements
        --accept-source-agreements --silent

        winget install --id Ninja-build.Ninja --source winget --accept-package-agreements
        --accept-source-agreements --silent

        '
    - name: Refresh PATH from registry
      shell: pwsh
      run: '$machinePath = [System.Environment]::GetEnvironmentVariable("Path","Machine")

        $userPath = [System.Environment]::GetEnvironmentVariable("Path","User")

        "$machinePath;$userPath" | Out-File -FilePath $env:GITHUB_PATH -Append

        '
    - name: Initialize opam (non-interactive) and create switch
      run: 'opam init --disable-sandboxing -c ocaml.5.3.0

        '
    - name: Build and install Catala through opam
      run: 'opam install ./catala.opam

        '
    - name: Run built-in tests
      run: 'opam exec -- dune exec -- clerk test tests doc

        opam exec -- dune exec -- clerk test tests --backend ocaml -c--disable-warnings
        --vars CC=x86_64-w64-mingw32-gcc

        '
    - name: Clone catala-examples
      run: '$ErrorActionPreference = ''Stop''

        $dst = "$env:USERPROFILE\catala-examples"

        if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }

        git clone https://github.com/CatalaLang/catala-examples --depth 1 $dst -b
        "${{ github.head_ref || github.ref_name }}" ||

        git clone https://github.com/CatalaLang/catala-examples --depth 1 $dst

        '
    - name: Run clerk test in catala-examples
      run: 'Push-Location "$env:USERPROFILE\catala-examples"

        opam exec -- clerk test

        Pop-Location

        '
